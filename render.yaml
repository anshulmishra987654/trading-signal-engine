services:
  - type: web
    name: trading-signal-engine
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: cd backend && python main.py
    envVars:
      - key: APP_PORT
        value: 10000
      - key: SIGNAL_HISTORY
        value: /tmp/signal_history.json
      - key: DEBUG
        value: false
